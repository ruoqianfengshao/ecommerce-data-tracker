<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨境电商选品数据分析平台</title>
    <meta name="description" content="专业的跨境电商选品数据追踪与分析平台">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Alpine.js for interactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .trend-up {
            color: #10b981;
        }
        
        .trend-down {
            color: #ef4444;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .badge-warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .badge-info {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-50" x-data="dashboard()" x-init="init()">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">跨境电商选品数据平台</h1>
                    <p class="text-purple-100 mt-1">Cross-Border E-Commerce Product Research Dashboard</p>
                </div>
                <div class="text-right">
                    <div class="text-sm text-purple-100">最后更新</div>
                    <div class="text-lg font-semibold" x-text="lastUpdated"></div>
                    <div class="text-sm text-purple-100 mt-1">
                        <select x-model="selectedDate" @change="loadData()" 
                                class="px-3 py-1 rounded text-gray-900 text-sm">
                            <template x-for="date in availableDates" :key="date">
                                <option :value="date" x-text="formatDate(date)"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading State -->
    <div x-show="loading" class="container mx-auto px-4 py-8">
        <div class="text-center">
            <div class="loading text-purple-600 text-lg">加载数据中...</div>
        </div>
    </div>

    <!-- Stats Overview -->
    <section class="container mx-auto px-4 py-8" x-show="!loading">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">总选品数</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.totalProducts"></p>
                    </div>
                    <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="trend-up font-semibold">历史数据</span>
                    <span class="text-gray-600 ml-2">可查询</span>
                </div>
            </div>

            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">高潜力产品</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.highPotential"></p>
                    </div>
                    <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="trend-up font-semibold" x-text="`${Math.round(stats.highPotential/stats.totalProducts*100)}%`"></span>
                    <span class="text-gray-600 ml-2">占比</span>
                </div>
            </div>

            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">平均利润率</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.avgMargin + '%'"></p>
                    </div>
                    <div class="w-12 h-12 bg-purple-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="trend-up font-semibold">超高溢价</span>
                    <span class="text-gray-600 ml-2">工艺品类</span>
                </div>
            </div>

            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">主流品类</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.topCategory"></p>
                    </div>
                    <div class="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="text-gray-600">综合评分</span>
                    <span class="font-semibold ml-2">8.5/10</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <section class="container mx-auto px-4 py-8" x-show="!loading">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Products List -->
            <div class="lg:col-span-2">
                <div class="card p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-gray-900" x-text="`${formatDate(selectedDate)} 推荐选品`"></h2>
                        <select class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                x-model="selectedCategory">
                            <option value="all">全部分类</option>
                            <option value="electronics">电子产品</option>
                            <option value="home">家居生活</option>
                            <option value="fashion">时尚配饰</option>
                            <option value="sports">运动户外</option>
                        </select>
                    </div>

                    <div class="space-y-4" x-show="filteredProducts.length > 0">
                        <template x-for="product in filteredProducts" :key="product.id">
                            <div class="border border-gray-200 rounded-lg p-4 hover:border-purple-500 transition-colors">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-3">
                                            <h3 class="text-lg font-semibold text-gray-900" x-text="product.name"></h3>
                                            <span class="badge" 
                                                  :class="product.potential === 'high' ? 'badge-success' : product.potential === 'medium' ? 'badge-warning' : 'badge-info'"
                                                  x-text="product.potentialText"></span>
                                        </div>
                                        <p class="text-sm text-gray-600 mt-1" x-text="product.description"></p>
                                        
                                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                                            <div>
                                                <p class="text-xs text-gray-500">预估利润</p>
                                                <p class="text-lg font-semibold text-green-600" x-text="product.margin + '%'"></p>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-500">市场需求</p>
                                                <div class="flex items-center mt-1">
                                                    <div class="flex-1 bg-gray-200 rounded-full h-2">
                                                        <div class="bg-blue-500 h-2 rounded-full" :style="`width: ${product.demand}%`"></div>
                                                    </div>
                                                    <span class="ml-2 text-sm font-medium" x-text="product.demand + '%'"></span>
                                                </div>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-500">竞争程度</p>
                                                <p class="text-lg font-semibold" x-text="product.competition"></p>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-500">推荐指数</p>
                                                <p class="text-lg font-semibold text-purple-600" x-text="product.score + '/10'"></p>
                                            </div>
                                        </div>
                                        
                                        <div class="mt-3 flex flex-wrap gap-2">
                                            <template x-for="tag in product.tags" :key="tag">
                                                <span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs" x-text="tag"></span>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                                    <div class="flex items-center gap-4 text-sm text-gray-600">
                                        <span>🌐 <span x-text="product.platform"></span></span>
                                        <span>💰 成本: $<span x-text="product.price.cost"></span> → 售价: $<span x-text="product.price.sell"></span></span>
                                    </div>
                                    <button class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors text-sm">
                                        查看详情
                                    </button>
                                </div>
                                
                                <div class="mt-3 text-xs text-gray-500 bg-blue-50 p-3 rounded" x-show="product.notes">
                                    <span class="font-semibold">💡 分析：</span>
                                    <span x-text="product.notes"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    
                    <div x-show="filteredProducts.length === 0" class="text-center py-12 text-gray-500">
                        暂无符合条件的选品数据
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="space-y-6">
                <!-- Category Distribution Chart -->
                <div class="card p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">品类分布</h3>
                    <canvas id="categoryChart"></canvas>
                </div>

                <!-- Quick Stats -->
                <div class="card p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">快速统计</h3>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">当日选品</span>
                            <span class="font-semibold text-blue-600" x-text="products.length + ' 个'"></span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">高潜力</span>
                            <span class="font-semibold text-green-600" x-text="products.filter(p => p.potential === 'high').length + ' 个'"></span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">中潜力</span>
                            <span class="font-semibold text-yellow-600" x-text="products.filter(p => p.potential === 'medium').length + ' 个'"></span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">平均评分</span>
                            <span class="font-semibold text-purple-600" x-text="(products.reduce((sum, p) => sum + p.score, 0) / products.length || 0).toFixed(1) + '/10'"></span>
                        </div>
                    </div>
                </div>

                <!-- Platform Distribution -->
                <div class="card p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">平台分布</h3>
                    <div class="space-y-2">
                        <template x-for="platform in platformStats" :key="platform.name">
                            <div>
                                <div class="flex items-center justify-between text-sm mb-1">
                                    <span class="text-gray-600" x-text="platform.name"></span>
                                    <span class="font-semibold" x-text="platform.count + ' 个'"></span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-purple-600 h-2 rounded-full" :style="`width: ${platform.percentage}%`"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">跨境电商选品数据分析平台 © 2026</p>
            <p class="text-sm text-gray-500 mt-2">
                Powered by GitHub Pages | 
                <a href="https://github.com/ruoqianfengshao/ecommerce-data-tracker" target="_blank" class="hover:text-purple-400">GitHub</a>
            </p>
        </div>
    </footer>

    <script>
        function dashboard() {
            return {
                loading: true,
                lastUpdated: '',
                selectedDate: '2026-04-12',
                availableDates: ['2026-04-12', '2026-04-11'],
                selectedCategory: 'all',
                products: [],
                stats: {
                    totalProducts: 0,
                    highPotential: 0,
                    avgMargin: 0,
                    topCategory: ''
                },
                categoryChart: null,
                
                get filteredProducts() {
                    if (this.selectedCategory === 'all') {
                        return this.products;
                    }
                    return this.products.filter(p => p.category === this.selectedCategory);
                },
                
                get platformStats() {
                    const counts = {};
                    this.products.forEach(p => {
                        counts[p.platform] = (counts[p.platform] || 0) + 1;
                    });
                    
                    return Object.entries(counts)
                        .map(([name, count]) => ({
                            name,
                            count,
                            percentage: Math.round((count / this.products.length) * 100)
                        }))
                        .sort((a, b) => b.count - a.count);
                },
                
                formatDate(dateStr) {
                    const date = new Date(dateStr);
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    return `${month}月${day}日`;
                },
                
                async loadData() {
                    this.loading = true;
                    try {
                        const response = await fetch(`./data/products/${this.selectedDate}.json`);
                        if (!response.ok) throw new Error('数据加载失败');
                        
                        const data = await response.json();
                        this.products = data.products || [];
                        
                        // Update stats
                        if (data.summary) {
                            this.stats.totalProducts = data.summary.totalProducts;
                            this.stats.highPotential = data.summary.highPotential;
                            this.stats.avgMargin = data.summary.avgMargin;
                            this.stats.topCategory = this.getCategoryName(data.summary.topCategory);
                        }
                        
                        this.lastUpdated = new Date(data.date).toLocaleDateString('zh-CN', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });
                        
                        // Update chart
                        this.updateCategoryChart();
                    } catch (error) {
                        console.error('Error loading data:', error);
                        this.products = [];
                    } finally {
                        this.loading = false;
                    }
                },
                
                getCategoryName(category) {
                    const names = {
                        'electronics': '电子产品',
                        'home': '家居生活',
                        'fashion': '时尚配饰',
                        'sports': '运动户外'
                    };
                    return names[category] || category;
                },
                
                updateCategoryChart() {
                    if (this.categoryChart) {
                        this.categoryChart.destroy();
                    }
                    
                    const categoryCounts = {};
                    this.products.forEach(p => {
                        const name = this.getCategoryName(p.category);
                        categoryCounts[name] = (categoryCounts[name] || 0) + 1;
                    });
                    
                    const ctx = document.getElementById('categoryChart');
                    this.categoryChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(categoryCounts),
                            datasets: [{
                                data: Object.values(categoryCounts),
                                backgroundColor: [
                                    '#667eea',
                                    '#764ba2',
                                    '#f093fb',
                                    '#4facfe',
                                    '#43e97b'
                                ]
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom'
                                }
                            }
                        }
                    });
                },
                
                async init() {
                    await this.loadData();
                }
            }
        }
    </script>
</body>
</html>
