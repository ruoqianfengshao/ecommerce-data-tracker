<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨境电商选品数据分析平台</title>
    <meta name="description" content="专业的跨境电商选品数据追踪与分析平台">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Alpine.js for interactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .trend-up {
            color: #10b981;
        }
        
        .trend-down {
            color: #ef4444;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .badge-warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .badge-info {
            background-color: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>
<body class="bg-gray-50" x-data="dashboard()">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">跨境电商选品数据平台</h1>
                    <p class="text-purple-100 mt-1">Cross-Border E-Commerce Product Research Dashboard</p>
                </div>
                <div class="text-right">
                    <div class="text-sm text-purple-100">最后更新</div>
                    <div class="text-lg font-semibold" x-text="lastUpdated"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Stats Overview -->
    <section class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">总选品数</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.totalProducts"></p>
                    </div>
                    <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="trend-up font-semibold">+12%</span>
                    <span class="text-gray-600 ml-2">较上周</span>
                </div>
            </div>

            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">高潜力产品</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.highPotential"></p>
                    </div>
                    <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="trend-up font-semibold">+8 个</span>
                    <span class="text-gray-600 ml-2">本周新增</span>
                </div>
            </div>

            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">平均利润率</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.avgMargin + '%'"></p>
                    </div>
                    <div class="w-12 h-12 bg-purple-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="trend-up font-semibold">+2.3%</span>
                    <span class="text-gray-600 ml-2">较上月</span>
                </div>
            </div>

            <div class="stat-card card p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">市场趋势</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2">稳定</p>
                    </div>
                    <div class="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm">
                    <span class="text-gray-600">综合评分</span>
                    <span class="font-semibold ml-2">8.5/10</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <section class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Products List -->
            <div class="lg:col-span-2">
                <div class="card p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-gray-900">今日推荐选品</h2>
                        <select class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                x-model="selectedCategory">
                            <option value="all">全部分类</option>
                            <option value="electronics">电子产品</option>
                            <option value="home">家居生活</option>
                            <option value="fashion">时尚配饰</option>
                            <option value="sports">运动户外</option>
                        </select>
                    </div>

                    <div class="space-y-4">
                        <template x-for="product in filteredProducts" :key="product.id">
                            <div class="border border-gray-200 rounded-lg p-4 hover:border-purple-500 transition-colors">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-3">
                                            <h3 class="text-lg font-semibold text-gray-900" x-text="product.name"></h3>
                                            <span class="badge" 
                                                  :class="product.potential === 'high' ? 'badge-success' : product.potential === 'medium' ? 'badge-warning' : 'badge-info'"
                                                  x-text="product.potentialText"></span>
                                        </div>
                                        <p class="text-sm text-gray-600 mt-1" x-text="product.description"></p>
                                        
                                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                                            <div>
                                                <p class="text-xs text-gray-500">预估利润</p>
                                                <p class="text-lg font-semibold text-green-600" x-text="product.margin + '%'"></p>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-500">市场需求</p>
                                                <div class="flex items-center mt-1">
                                                    <div class="flex-1 bg-gray-200 rounded-full h-2">
                                                        <div class="bg-blue-500 h-2 rounded-full" :style="`width: ${product.demand}%`"></div>
                                                    </div>
                                                    <span class="ml-2 text-sm font-medium" x-text="product.demand + '%'"></span>
                                                </div>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-500">竞争程度</p>
                                                <p class="text-lg font-semibold" x-text="product.competition"></p>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-500">推荐指数</p>
                                                <p class="text-lg font-semibold text-purple-600" x-text="product.score + '/10'"></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                                    <div class="flex items-center gap-4 text-sm text-gray-600">
                                        <span>🌐 <span x-text="product.platform"></span></span>
                                        <span>📅 <span x-text="product.date"></span></span>
                                    </div>
                                    <button class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                                        查看详情
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="space-y-6">
                <!-- Category Distribution Chart -->
                <div class="card p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">品类分布</h3>
                    <canvas id="categoryChart"></canvas>
                </div>

                <!-- Quick Stats -->
                <div class="card p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">快速统计</h3>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">本周新增</span>
                            <span class="font-semibold text-blue-600">23 个</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">待验证</span>
                            <span class="font-semibold text-yellow-600">12 个</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">已上架</span>
                            <span class="font-semibold text-green-600">156 个</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">总收藏</span>
                            <span class="font-semibold text-purple-600">89 个</span>
                        </div>
                    </div>
                </div>

                <!-- Trend Chart -->
                <div class="card p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">本周趋势</h3>
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">跨境电商选品数据分析平台 © 2026</p>
            <p class="text-sm text-gray-500 mt-2">Powered by GitHub Pages</p>
        </div>
    </footer>

    <script>
        function dashboard() {
            return {
                lastUpdated: new Date().toLocaleString('zh-CN'),
                selectedCategory: 'all',
                stats: {
                    totalProducts: 156,
                    highPotential: 34,
                    avgMargin: 32.5,
                },
                products: [
                    {
                        id: 1,
                        name: '智能手表表带',
                        description: '适配Apple Watch的多彩硅胶表带，多种颜色可选',
                        category: 'electronics',
                        potential: 'high',
                        potentialText: '高潜力',
                        margin: 45,
                        demand: 85,
                        competition: '中',
                        score: 8.5,
                        platform: 'Amazon',
                        date: '2026-04-12'
                    },
                    {
                        id: 2,
                        name: '便携式LED化妆镜',
                        description: '可折叠三面镜，内置充电电池，三档亮度调节',
                        category: 'home',
                        potential: 'high',
                        potentialText: '高潜力',
                        margin: 52,
                        demand: 78,
                        competition: '低',
                        score: 9.0,
                        platform: 'eBay',
                        date: '2026-04-12'
                    },
                    {
                        id: 3,
                        name: '车载手机支架',
                        description: '磁吸式360度旋转，适配所有车型和手机',
                        category: 'electronics',
                        potential: 'medium',
                        potentialText: '中潜力',
                        margin: 38,
                        demand: 72,
                        competition: '高',
                        score: 7.2,
                        platform: 'AliExpress',
                        date: '2026-04-11'
                    },
                    {
                        id: 4,
                        name: '运动水壶套装',
                        description: '不锈钢保温壶+硅胶套，24小时保温保冷',
                        category: 'sports',
                        potential: 'medium',
                        potentialText: '中潜力',
                        margin: 42,
                        demand: 68,
                        competition: '中',
                        score: 7.8,
                        platform: 'Amazon',
                        date: '2026-04-11'
                    }
                ],
                get filteredProducts() {
                    if (this.selectedCategory === 'all') {
                        return this.products;
                    }
                    return this.products.filter(p => p.category === this.selectedCategory);
                },
                init() {
                    this.initCharts();
                },
                initCharts() {
                    // Category Distribution Chart
                    const categoryCtx = document.getElementById('categoryChart');
                    new Chart(categoryCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['电子产品', '家居生活', '时尚配饰', '运动户外'],
                            datasets: [{
                                data: [35, 28, 22, 15],
                                backgroundColor: [
                                    '#667eea',
                                    '#764ba2',
                                    '#f093fb',
                                    '#4facfe'
                                ]
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom'
                                }
                            }
                        }
                    });

                    // Trend Chart
                    const trendCtx = document.getElementById('trendChart');
                    new Chart(trendCtx, {
                        type: 'line',
                        data: {
                            labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                            datasets: [{
                                label: '新增选品',
                                data: [5, 8, 12, 7, 15, 10, 18],
                                borderColor: '#667eea',
                                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
